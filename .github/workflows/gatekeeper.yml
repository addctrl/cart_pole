name: Gatekeeper CI

on:
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff — linter
        run: ruff check .

      - name: Ruff — formatter
        run: ruff format --check .

      - name: Mypy — typowanie
        run: mypy src/

      - name: Pytest — testy i coverage
        run: |
          pytest
          status=$?
          if [ "$status" -eq 0 ] || [ "$status" -eq 5 ]; then
            exit 0
          fi
          exit "$status"
